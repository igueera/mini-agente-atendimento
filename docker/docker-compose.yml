# Infraestrutura da Evolution API
# Sobe 3 containers: evolution-api, postgresql e redis
# Rodar: docker-compose up -d


version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution123
      - POSTGRES_DB=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=minha-chave-secreta-123
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution123@postgres:5432/evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - BAILEYS_BROWSER=Chrome
      - CONFIG_SESSION_ENABLED=true
      - CONFIG_SESSION_AUTOLOAD=true
      - CONFIG_SESSION_PHONE_CLIENT=Chrome
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1037170828
    depends_on:
      - postgres
      - redis
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  postgres_data: